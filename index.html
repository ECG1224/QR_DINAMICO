<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Cargando...</title>
  <style>
    body {
      background-color: lightblue;
      text-align: center;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Contenedor centrado */
    .contenedor {
      margin-top: 120px;
    }

    /* Logo */
    .logo {
      width: 220px;
      max-width: 90%;
    }

    /* Texto */
    .texto {
      font-size: 22px;
      margin-top: 20px;
      color: #333;
    }

    /* Spinner */
    .lds-ring {
      display: inline-block;
      position: relative;
      width: 80px;
      height: 80px;
      margin-top: 30px;
    }

    .lds-ring div {
      box-sizing: border-box;
      display: block;
      position: absolute;
      width: 64px;
      height: 64px;
      margin: 8px;
      border: 8px solid white;
      border-radius: 50%;
      animation: lds-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
      border-color: white transparent transparent transparent;
    }

    .lds-ring div:nth-child(1) {
      animation-delay: -0.45s;
    }

    .lds-ring div:nth-child(2) {
      animation-delay: -0.3s;
    }

    .lds-ring div:nth-child(3) {
      animation-delay: -0.15s;
    }

    @keyframes lds-ring {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>

  <div class="contenedor">
    <img 
      src="https://drive.google.com/uc?export=view&id=1wWRk8NrdBMyGSXi8KS4RoT-nn-QecTNk" 
      class="logo" 
      alt="Logo"
    >

    <div class="texto">
      Cargando información...
    </div>

    <div class="lds-ring">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <script>
    const AS_URL_BASE = "https://script.google.com/macros/s/AKfycbxrjeC1L-JEmL3Cx-QPSqmGjxMSiKb8PkbIHiyVNSXIHT1QLWQSNi9G2o6JtAwq0J98/exec";

    var url = document.location.href;
    var k = url.substr(url.lastIndexOf("k=") + 2);

    if (k) {
      fetch(AS_URL_BASE + '?k=' + k)
        .then(r => r.text())
        .then((r) => {
          console.log(r);
          if (r) {
            document.location.replace(r);
          }
        })
        .catch(err => console.log(err));
    }
  </script>

</body>
</html>
